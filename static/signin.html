<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
  <link rel="stylesheet" href="/static/auth.css">
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <h1>Sign in</h1>
      <p>Player props require a free account. Games and news stay open without signing in.</p>
      <form id="signin-form" autocomplete="on">
        <div class="auth-field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" autocomplete="email" required>
        </div>
        <div class="auth-field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div id="signin-error" class="auth-error" role="alert"></div>
        <div id="signin-note" class="auth-note hidden" role="status"></div>
        <button type="submit" class="auth-submit" id="signin-btn">Sign in</button>
      </form>
      <p class="auth-switch">No account? <a href="/signup">Create one</a></p>
      <a class="auth-back" href="/">← Back to home</a>
    </div>
  </div>
  <script src="/static/pwa.js?v=20260725"></script>
  <script src="/static/auth.js"></script>
  <script>
    initSignInPage();
  </script>
</body>
</html>

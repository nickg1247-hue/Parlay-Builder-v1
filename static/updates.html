<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Updates — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="app-shell">
    <header class="app-topbar">
      <div class="app-nav-row">
        <a class="app-brand" href="/">NTG <span>Sports</span></a>
        <nav class="app-nav-links" aria-label="Site tools"></nav>
      </div>
    </header>

    <main class="app-main updates-main">
      <h1>Site updates</h1>
      <p class="updates-lead">Recent changes to NTG Sports — experimental analytics, not betting advice.</p>
      <div id="updates-list" class="updates-list">
        <p class="updates-loading">Loading…</p>
      </div>
      <p class="updates-foot"><a href="/">← Back to home</a></p>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script>
    (async function () {
      const list = document.getElementById("updates-list");
      try {
        const data = await fetchSiteUpdates();
        renderUpdatesHistory(list, data);
      } catch (_) {
        list.innerHTML = "<p class=\"updates-loading\">Could not load updates.</p>";
      }
    })();
  </script>
</body>
</html>

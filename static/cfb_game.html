<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/assets/ntg-logo.png?v=20260740" type="image/png">
  <title>CFB Game — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css?v=20260740">
  <link rel="stylesheet" href="/static/app.css?v=20260740">
  <link rel="stylesheet" href="/static/brand.css?v=20260740">
  <link rel="stylesheet" href="/static/design.css?v=20260740">
  <link rel="stylesheet" href="/static/home-v2.css?v=20260740">
</head>
<body class="ntg-shell home-v2 game-page-bg" data-sport="cfb">
  <div class="game-page-wash" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="app-topbar dash-topbar">
      <div class="app-nav-row dash-nav-row">
        <a class="app-brand app-brand--lockup" href="/" aria-label="NTG Sports home">
          <img class="app-brand-logo app-brand-logo--dash" src="/static/assets/ntg-logo.png?v=20260740" alt="NTG Sports" width="56" height="56" />
        </a>
        <nav class="app-nav-primary dash-primary-nav" aria-label="Primary"></nav>
        <nav class="app-nav-links dash-utility-nav" aria-label="Account & tools"></nav>
      </div>
      <div class="dash-subnav">
        <div class="sport-pills dash-sport-pills" aria-label="Sports"></div>
      </div>
      <div class="dash-sync-wrap">
        <div id="site-refresh-bar" class="site-refresh-bar dash-sync-text" aria-live="polite">Checking sync…</div>
        <div class="dash-progress" aria-hidden="true">
          <div id="dash-progress-fill" class="dash-progress-fill"></div>
        </div>
      </div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main dash-main">
      <div id="game-loading" class="empty-state">Loading game…</div>
      <div id="game-error" class="error-state hidden"></div>
      <div id="game-content" class="hidden">
        <header class="matchup-header" id="matchup-header"></header>

        <p class="app-section-title">
          Matchup
          <span id="model-badge" class="lines-updated hidden"></span>
        </p>

        <div class="warnings" id="insights-warnings"></div>
        <div id="game-matchup-board" class="matchup-board"></div>

        <details class="feature-table-wrap" open>
          <summary class="app-section-title">Model features (v2 snapshot)</summary>
          <div id="feature-snapshot"></div>
        </details>

        <p class="disclaimer-small" id="game-disclaimer">
          Experimental analytics — not betting advice. betting_ready=false until forward CLV validates edge.
        </p>
      </div>
    </main>
  </div>
  <script src="/static/app.js?v=20260740"></script>
  <script src="/static/cfb_game.js?v=20260740"></script>
</body>
</html>

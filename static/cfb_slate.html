<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/assets/ntg-logo.png?v=20260742" type="image/png">
  <title>CFB — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css?v=20260742">
  <link rel="stylesheet" href="/static/app.css?v=20260742">
  <link rel="stylesheet" href="/static/brand.css?v=20260742">
  <link rel="stylesheet" href="/static/design.css?v=20260742">
  <link rel="stylesheet" href="/static/home-v2.css?v=20260742">
</head>
<body class="ntg-shell home-v2 slate-cfb" data-sport="cfb">
  <div class="app-shell">
    <header class="app-topbar dash-topbar">
      <div class="app-nav-row dash-nav-row">
        <a class="app-brand app-brand--lockup" href="/" aria-label="NTG Sports home">
          <img class="app-brand-logo app-brand-logo--dash" src="/static/assets/ntg-logo.png?v=20260742" alt="NTG Sports" width="56" height="56" />
        </a>
        <nav class="app-nav-primary dash-primary-nav" aria-label="Primary"></nav>
        <nav class="app-nav-links dash-utility-nav" aria-label="Account & tools"></nav>
      </div>
      <div class="dash-subnav">
        <div class="sport-pills dash-sport-pills" aria-label="Sports"></div>
      </div>
      <div class="dash-sync-wrap">
        <div id="site-refresh-bar" class="site-refresh-bar dash-sync-text" aria-live="polite">Checking sync…</div>
        <div class="dash-progress" aria-hidden="true">
          <div id="dash-progress-fill" class="dash-progress-fill"></div>
        </div>
      </div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main dash-main">
      <header class="dash-page-header">
        <div>
          <h1>College Football</h1>
          <p class="dash-page-kicker">FBS schedule · <a href="/cfb/board">Predictions board</a></p>
        </div>
        <span class="dash-page-kicker" id="slate-date"></span>
      </header>

      <div class="slate-toolbar dash-toolbar" id="slate-toolbar">
        <label class="slate-date-field" for="slate-date-input">
          Date
          <input type="date" id="slate-date-input" aria-label="Slate date" />
        </label>
        <button type="button" class="dash-btn dash-btn-primary" id="slate-date-go">Go</button>
        <button type="button" class="dash-btn dash-btn-ghost hidden" id="slate-date-refresh" title="Re-fetch from ingest or ESPN">
          Refresh
        </button>
        <span class="slate-source-badge hidden" id="slate-source" aria-live="polite"></span>
      </div>

      <div id="slate-advance-banner" class="hidden" aria-live="polite"></div>
      <div id="slate-loading" class="empty-state hidden">Loading CFB slate…</div>
      <div id="slate-error" class="error-state hidden"></div>
      <div id="game-list" class="game-list"></div>
    </main>
  </div>
  <script src="/static/app.js?v=20260742"></script>
  <script>
    (async function () {
      const loading = document.getElementById("slate-loading");
      const errEl = document.getElementById("slate-error");
      const list = document.getElementById("game-list");
      const dateEl = document.getElementById("slate-date");
      const advanceEl = document.getElementById("slate-advance-banner");
      const dateInput = document.getElementById("slate-date-input");
      const goBtn = document.getElementById("slate-date-go");
      const refreshBtn = document.getElementById("slate-date-refresh");
      const sourceEl = document.getElementById("slate-source");
      const dateParam = qs("date");
      const refreshParam = qs("refresh") === "true";
      let pollTimer = null;

      const todayIso = new Date().toISOString().slice(0, 10);
      dateInput.value = dateParam || todayIso;

      function navigateDate(iso, refresh) {
        const params = new URLSearchParams();
        if (iso) params.set("date", iso);
        if (refresh) params.set("refresh", "true");
        const q = params.toString();
        window.location.href = q ? `/cfb?${q}` : "/cfb";
      }

      goBtn.addEventListener("click", () => {
        if (dateInput.value) navigateDate(dateInput.value, false);
      });
      dateInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") goBtn.click();
      });
      refreshBtn.addEventListener("click", () => {
        navigateDate(dateInput.value || dateParam || todayIso, true);
      });

      initLiveTicker("live-ticker", { date: dateParam || dateInput.value, sport: "cfb" });
      initHeadlineTicker("headline-ticker");
      renderSkeletonGameList(list, 6);

      function scheduleUrl(refresh) {
        const d = dateParam || dateInput.value;
        const params = new URLSearchParams();
        if (d) params.set("date", d);
        if (refresh) params.set("refresh", "true");
        const q = params.toString();
        return q ? `/api/schedule/cfb?${q}` : "/api/scores/today?sport=cfb";
      }

      const loadUrl = dateParam || refreshParam
        ? scheduleUrl(refreshParam)
        : "/api/scores/today?sport=cfb";

      function sourceLabel(source) {
        if (source === "ingest") return "Saved ingest";
        if (source === "cache") return "Saved snapshot";
        if (source === "api") return "ESPN API";
        return source || "";
      }

      function showSource(slate) {
        const label = sourceLabel(slate.source);
        if (!label) {
          sourceEl.classList.add("hidden");
          return;
        }
        sourceEl.textContent = label;
        sourceEl.classList.remove("hidden");
        refreshBtn.classList.remove("hidden");
      }

      function mapGames(data) {
        const slateDate = data.resolved_date || data.date || "";
        return (data.games || []).map((g) => ({
          ...g,
          sport: "cfb",
          slate_date: slateDate,
        }));
      }

      async function loadSlate(url) {
        const slate = await fetchJSON(url);
        const games = mapGames(slate);
        const slateDate = slate.resolved_date || slate.date || "";

        loading.classList.add("hidden");
        dateEl.textContent = slateDate;
        if (slateDate) dateInput.value = slateDate.slice(0, 10);
        showSource(slate);
        renderSlateAdvanceBanner(advanceEl, slate);

        if (!games.length) {
          list.innerHTML = "";
          renderEmptyState(list, "no-cfb-games");
          return;
        }

        let boardMap = {};
        try {
          boardMap = await fetchSportBoardMap("cfb", slateDate);
          if (!Object.keys(boardMap).length) {
            const preds = await fetchJSON(
              `/api/cfb/predictions?date=${encodeURIComponent(slateDate)}`
            );
            if (Array.isArray(preds)) {
              preds.forEach((p) => { boardMap[p.game_id] = p; });
            } else if (preds && typeof preds === "object") {
              boardMap = preds.predictions
                ? boardMapFromSlate(preds.predictions)
                : preds;
            }
          }
        } catch (_) { /* model optional */ }

        renderGameList(list, games, {
          boardMap,
          gameDate: slateDate,
          useCache: true,
          colors: _teamColors,
        });
      }

      try {
        await loadSlate(loadUrl);
        if (!dateParam && !refreshParam) {
          pollTimer = setInterval(async () => {
            try {
              const live = await fetchJSON("/api/scores/today?sport=cfb");
              renderSlateAdvanceBanner(advanceEl, live);
              const slateDate = live.resolved_date || live.date || "";
              dateEl.textContent = slateDate;
              showSource(live);
              updateGameCards(list, mapGames(live));
            } catch (_) { /* keep last good state */ }
          }, 60000);
        }
      } catch (e) {
        list.innerHTML = "";
        loading.classList.add("hidden");
        errEl.classList.remove("hidden");
        errEl.textContent = e.message || "Failed to load schedule";
      }

      window.addEventListener("beforeunload", () => {
        if (pollTimer) clearInterval(pollTimer);
      });
    })();
  </script>
</body>
</html>

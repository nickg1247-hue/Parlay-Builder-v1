<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLB — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="slate-mlb">
  <div class="app-shell">
    <header class="app-topbar">
      <div class="app-nav-row">
        <a class="app-brand" href="/">NTG <span>Sports</span></a>
        <nav class="app-nav-links" aria-label="Site tools"></nav>
      </div>
      <div class="sport-pills" aria-label="Sports"></div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main">
      <div class="slate-header">
        <h1>MLB</h1>
        <span class="slate-date" id="slate-date"></span>
      </div>
      <p class="refresh-line" id="refresh-line"></p>

      <div id="watched-section" class="hidden"></div>

      <hr class="app-section-divider" aria-hidden="true">

      <div id="slate-loading" class="hidden"></div>
      <div id="slate-error" class="error-state hidden"></div>
      <div id="game-list" class="game-list"></div>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script>
    (async function () {
      const loading = document.getElementById("slate-loading");
      const errEl = document.getElementById("slate-error");
      const list = document.getElementById("game-list");
      const dateEl = document.getElementById("slate-date");
      const refreshEl = document.getElementById("refresh-line");
      const watchedEl = document.getElementById("watched-section");
      const dateParam = qs("date");

      initLiveTicker("live-ticker", { date: dateParam, sport: "all" });
      initHeadlineTicker("headline-ticker");
      await loadTeamColors();
      renderSkeletonGameList(list, 8);

      const loadUrl = dateParam
        ? `/api/schedule/mlb?date=${encodeURIComponent(dateParam)}`
        : "/api/scores/today?sport=mlb";

      try {
        const [slate, summary, odds, status] = await Promise.all([
          fetchJSON(loadUrl),
          fetchJSON(dateParam ? `/api/home/today?date=${encodeURIComponent(dateParam)}` : "/api/home/today").catch(() => ({})),
          fetchJSON("/api/odds/today").catch(() => null),
          fetchJSON("/api/status/refresh").catch(() => null),
        ]);

        if (odds) recordOddsSnapshot(odds, slate.games);

        loading.classList.add("hidden");
        dateEl.textContent = slate.date || "";
        if (status) {
          refreshEl.textContent = formatRefreshStatus(status);
          refreshEl.classList.toggle("ok", Boolean(status.ok || status.display_updated_at));
        }
        pollRefreshStatusLine(refreshEl, 60000);

        const boardMap = summary.slate_by_game_id || {};
        const renderOpts = {
          boardMap,
          gameDate: slate.date,
          colors: _teamColors,
        };

        if (!slate.games.length) {
          list.innerHTML = "";
          renderEmptyState(list, "no-games");
          return;
        }

        if (!summary.board_available && !dateParam) {
          refreshEl.textContent = (refreshEl.textContent || "") + " · Model picks: run morning refresh";
        }

        renderGameList(list, slate.games, renderOpts);
        renderWatchedGamesSection(watchedEl, slate.games, renderOpts);

        if (!dateParam) {
          setInterval(async () => {
            try {
              const [live, snap] = await Promise.all([
                fetchJSON("/api/scores/today?sport=mlb"),
                fetchJSON("/api/odds/today").catch(() => null),
              ]);
              if (snap) recordOddsSnapshot(snap, live.games);
              updateGameCards(list, live.games);
            } catch (_) { /* keep last good state */ }
          }, 60000);
        }
      } catch (e) {
        list.innerHTML = "";
        loading.classList.add("hidden");
        errEl.classList.remove("hidden");
        errEl.textContent = e.message || "Failed to load schedule";
      }
    })();
  </script>
</body>
</html>

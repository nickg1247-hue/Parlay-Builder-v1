<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/assets/ntg-logo.png?v=20260725" type="image/png">
  <title>MLB — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css?v=20260725">
  <link rel="stylesheet" href="/static/app.css?v=20260725">
  <link rel="stylesheet" href="/static/brand.css?v=20260725">
  <link rel="stylesheet" href="/static/design.css?v=20260725">
  <link rel="stylesheet" href="/static/home-v2.css?v=20260725">
</head>
<body class="ntg-shell home-v2 slate-mlb">
  <div class="app-shell">
    <header class="app-topbar dash-topbar">
      <div class="app-nav-row dash-nav-row">
        <a class="app-brand app-brand--lockup" href="/" aria-label="NTG Sports home">
          <img class="app-brand-logo app-brand-logo--dash" src="/static/assets/ntg-logo.png?v=20260725" alt="NTG Sports" width="56" height="56" />
        </a>
        <nav class="app-nav-primary dash-primary-nav" aria-label="Primary"></nav>
        <nav class="app-nav-links dash-utility-nav" aria-label="Account & tools"></nav>
      </div>
      <div class="dash-subnav">
        <div class="sport-pills dash-sport-pills" aria-label="Sports"></div>
      </div>
      <div class="dash-sync-wrap">
        <div id="site-refresh-bar" class="site-refresh-bar dash-sync-text" aria-live="polite">Checking sync…</div>
        <div class="dash-progress" aria-hidden="true">
          <div id="dash-progress-fill" class="dash-progress-fill"></div>
        </div>
      </div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main dash-main">
      <header class="dash-page-header">
        <h1>MLB slate</h1>
        <span class="dash-page-kicker" id="slate-date"></span>
      </header>
      <p class="refresh-line dash-sync-text" id="refresh-line"></p>

      <div id="watched-section" class="hidden"></div>

      <div id="slate-loading" class="hidden"></div>
      <div id="slate-error" class="error-state hidden"></div>
      <div id="game-list" class="game-list"></div>
    </main>
  </div>
  <script src="/static/app.js?v=20260725"></script>
  <script>
    (async function () {
      const loading = document.getElementById("slate-loading");
      const errEl = document.getElementById("slate-error");
      const list = document.getElementById("game-list");
      const dateEl = document.getElementById("slate-date");
      const refreshEl = document.getElementById("refresh-line");
      const watchedEl = document.getElementById("watched-section");
      const pageData = typeof getPageData === "function" ? getPageData() : null;

      initSiteChrome();
      initLiveTicker("live-ticker", { sport: "all" });
      initHeadlineTicker("headline-ticker");
      await loadTeamColors();

      if (!pageData || pageData.kind !== "mlb_slate") {
        list.innerHTML = "";
        errEl?.classList.remove("hidden");
        if (errEl) errEl.textContent = "Page data missing — reload from the server.";
        return;
      }

      const slate = pageData.slate || {};
      const summary = pageData.summary || {};
      const odds = pageData.odds;
      const status = pageData.status;

      loading?.classList.add("hidden");
      if (odds && slate.games) recordOddsSnapshot(odds, slate.games);
      if (dateEl) dateEl.textContent = slate.date || pageData.date || "";
      if (status && refreshEl) {
        refreshEl.textContent = formatRefreshStatus(status);
        refreshEl.classList.toggle("ok", Boolean(status.ok || status.display_updated_at));
      }

      const boardMap = summary.slate_by_game_id || {};
      const renderOpts = {
        boardMap,
        gameDate: slate.date || pageData.date,
        colors: _teamColors,
      };

      if (!slate.games?.length) {
        list.innerHTML = "";
        renderEmptyState(list, "no-games");
        return;
      }

      if (!summary.board_available) {
        if (refreshEl) {
          refreshEl.textContent =
            (refreshEl.textContent || "") + " · Model picks: run morning refresh";
        }
      }

      renderGameList(list, slate.games, renderOpts);
      renderWatchedGamesSection(watchedEl, slate.games, renderOpts);
    })();
  </script>
</body>
</html>

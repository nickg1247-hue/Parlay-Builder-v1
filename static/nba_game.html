<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBA Game — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body class="game-page-bg">
  <div class="game-page-wash" aria-hidden="true"></div>
  <div class="app-shell">
    <header class="app-topbar">
      <div class="app-nav-row">
        <a class="app-brand" href="/">NTG <span>Sports</span></a>
        <nav class="app-nav-links" aria-label="Site tools"></nav>
      </div>
      <div class="sport-pills" aria-label="Sports"></div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>

    <main class="app-main">
      <div id="game-loading" class="empty-state">Loading game…</div>
      <div id="game-error" class="error-state hidden"></div>
      <div id="game-content" class="hidden">
        <header class="matchup-header" id="matchup-header"></header>

        <p class="app-section-title">
          Matchup
          <span id="lines-updated" class="lines-updated hidden"></span>
          <a href="#" id="insights-refresh" class="insights-refresh-link hidden">Refresh odds</a>
        </p>

        <div class="warnings" id="insights-warnings"></div>
        <div id="game-matchup-board" class="matchup-board"></div>

        <section id="prediction-detail" class="prediction-detail hidden">
          <p class="app-section-title">Why this pick <span class="sub" id="prediction-model-label"></span></p>
          <p class="prediction-note" id="prediction-data-note"></p>
          <ul id="prediction-drivers" class="prediction-drivers"></ul>
          <details class="feature-table-wrap">
            <summary>All 15 weighted factors</summary>
            <table class="feature-table" id="prediction-features"></table>
          </details>
        </section>

        <p class="disclaimer-small" id="game-disclaimer">
          Experimental analytics — not betting advice. betting_ready=false until forward CLV validates edge.
        </p>
      </div>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script src="/static/nba_game.js"></script>
</body>
</html>

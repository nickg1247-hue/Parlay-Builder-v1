<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    document.documentElement.classList.add("ntg-splash-pending");
    window.setTimeout(function () {
      document.documentElement.classList.remove("ntg-splash-pending", "ntg-splash-active");
    }, 6000);
  </script>
  <title>NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/app.css">
</head>
<body data-ntg-splash="1">
  <div class="app-shell">
    <header class="app-topbar">
      <div class="app-nav-row">
        <a class="app-brand" href="/">NTG <span>Sports</span></a>
        <nav class="app-nav-links" aria-label="Sections">
          <a href="/mlb" class="active">MLB</a>
          <a href="/nba">NBA</a>
        </nav>
      </div>
      <div class="sport-pills" aria-label="Sports">
        <a class="sport-pill sport-pill-active" href="/mlb">
          <svg class="sport-pill-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><circle cx="8" cy="8" r="6"/><path d="M5 5c1 2 1 4 0 6M11 5c-1 2-1 4 0 6"/></svg>MLB
        </a>
        <a class="sport-pill" href="/nba">
          <svg class="sport-pill-icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.2" aria-hidden="true"><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c2 2 3 4 3 6s-1 4-3 6M8 2c-2 2-3 4-3 6s1 4 3 6"/></svg>NBA
        </a>
        <span class="sport-pill sport-pill-disabled" title="Coming soon">NFL</span>
        <span class="sport-pill sport-pill-disabled" title="Coming soon">NHL</span>
        <a class="sport-pill" href="/cfb" title="College Football">CFB</a>
      </div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main">
      <p class="refresh-line" id="refresh-line">Checking last update…</p>

      <section class="home-hero">
        <h1>Sports hub</h1>
        <p>Model picks, markets, and parlays — experimental analytics, not betting advice.</p>
        <div id="hero-chips" class="hero-chips" aria-label="Today at a glance"></div>
      </section>

      <hr class="app-section-divider" aria-hidden="true">

      <p class="app-section-title">Today at a glance</p>
      <div id="today-glance">
        <div class="skeleton-row" style="height: 4rem; border-radius: 10px;"></div>
      </div>

      <hr class="app-section-divider" aria-hidden="true">

      <p class="app-section-title">Best bets today</p>
      <div id="best-bets" class="best-bets-strip">
        <div class="skeleton-card" style="min-width: 10rem; padding: 0.65rem;"><div class="skeleton-row"></div></div>
        <div class="skeleton-card" style="min-width: 10rem; padding: 0.65rem;"><div class="skeleton-row"></div></div>
      </div>

      <div id="watched-section" class="hidden"></div>

      <hr class="app-section-divider" aria-hidden="true">

      <p class="app-section-title">Explore</p>
      <div class="home-links">
        <a class="home-link-card" href="/mlb">
          <span>MLB game slate</span>
          <span class="arrow">→</span>
        </a>
        <a class="home-link-card" href="/nba">
          <span>NBA game slate</span>
          <span class="arrow">→</span>
        </a>
      </div>

      <hr class="app-section-divider" aria-hidden="true">

      <section>
        <p class="app-section-title">News</p>
        <div id="news-list" class="news-list">
          <p class="news-loading">Loading headlines…</p>
        </div>
      </section>
    </main>
  </div>
  <script src="/static/app.js"></script>
  <script>
    initLiveTicker("live-ticker", { sport: "all" });
    initHeadlineTicker("headline-ticker");

    (async function () {
      await loadTeamColors();
      const glance = document.getElementById("today-glance");
      const bets = document.getElementById("best-bets");
      const watched = document.getElementById("watched-section");
      const refreshEl = document.getElementById("refresh-line");
      const heroChips = document.getElementById("hero-chips");

      try {
        const [summary, scores, odds, status] = await Promise.all([
          fetchJSON("/api/home/today"),
          fetchJSON("/api/scores/today?sport=all"),
          fetchJSON("/api/odds/today").catch(() => null),
          fetchJSON("/api/status/refresh").catch(() => null),
        ]);

        if (status) {
          refreshEl.textContent = formatRefreshStatus(status);
          refreshEl.classList.toggle("ok", status.ok);
        }

        if (odds) recordOddsSnapshot(odds, scores.games);

        const counts = scores.sports || {
          mlb: (scores.games || []).filter((g) => g.sport === "mlb").length,
          nba: (scores.games || []).filter((g) => g.sport === "nba").length,
        };

        renderHomeHeroChips(heroChips, { summary, scoreCounts: counts, status });
        renderTodayGlance(glance, summary, counts);
        renderBestBets(bets, summary.top_singles);
        renderWatchedGamesSection(watched, scores.games || [], {
          boardMap: summary.slate_by_game_id || {},
          gameDate: summary.date,
          colors: _teamColors,
        });
      } catch (e) {
        renderHomeHeroChips(heroChips, { summary: null, scoreCounts: null, status: null });
        glance.innerHTML = `<div class="glance-card glance-muted"><span>Could not load today's summary.</span></div>`;
        bets.innerHTML = `<div class="best-bets-empty-card">${emptyStateIcon("no-bets")}<p>Best bets unavailable.</p></div>`;
        refreshEl.textContent = "Could not load refresh status";
      }
    })();

    (async function () {
      const list = document.getElementById("news-list");
      function showEmpty(msg) {
        list.replaceChildren();
        const card = document.createElement("div");
        card.className = "news-empty-card";
        card.innerHTML = `${emptyStateIcon("news")}<p>${msg}</p>`;
        list.appendChild(card);
      }
      try {
        const data = await fetchJSON("/api/news");
        const items = data.items || [];
        if (!items.length) {
          showEmpty(data.error || "No headlines available right now.");
          return;
        }
        list.replaceChildren();
        items.forEach((item) => {
          const link = document.createElement("a");
          link.className = "news-item";
          link.href = item.link;
          link.target = "_blank";
          link.rel = "noopener noreferrer";
          const title = document.createElement("span");
          title.className = "news-title";
          title.textContent = item.title;
          const meta = document.createElement("span");
          meta.className = "news-meta";
          meta.textContent = item.source || "News";
          link.append(title, meta);
          list.appendChild(link);
        });
      } catch (e) {
        showEmpty("Headlines unavailable");
      }
    })();
  </script>
</body>
</html>

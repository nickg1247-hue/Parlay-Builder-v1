<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/static/assets/ntg-logo.png?v=20260742" type="image/png">
  <title>NBA — NTG Sports</title>
  <link rel="stylesheet" href="/static/style.css?v=20260742">
  <link rel="stylesheet" href="/static/app.css?v=20260742">
  <link rel="stylesheet" href="/static/brand.css?v=20260742">
  <link rel="stylesheet" href="/static/design.css?v=20260742">
  <link rel="stylesheet" href="/static/home-v2.css?v=20260742">
</head>
<body class="ntg-shell home-v2 slate-nba" data-sport="nba">
  <div class="app-shell">
    <header class="app-topbar dash-topbar">
      <div class="app-nav-row dash-nav-row">
        <a class="app-brand app-brand--lockup" href="/" aria-label="NTG Sports home">
          <img class="app-brand-logo app-brand-logo--dash" src="/static/assets/ntg-logo.png?v=20260742" alt="NTG Sports" width="56" height="56" />
        </a>
        <nav class="app-nav-primary dash-primary-nav" aria-label="Primary"></nav>
        <nav class="app-nav-links dash-utility-nav" aria-label="Account & tools"></nav>
      </div>
      <div class="dash-subnav">
        <div class="sport-pills dash-sport-pills" aria-label="Sports"></div>
      </div>
      <div class="dash-sync-wrap">
        <div id="site-refresh-bar" class="site-refresh-bar dash-sync-text" aria-live="polite">Checking sync…</div>
        <div class="dash-progress" aria-hidden="true">
          <div id="dash-progress-fill" class="dash-progress-fill"></div>
        </div>
      </div>
    </header>

    <div id="live-ticker" class="ticker-placeholder" aria-label="Live scores"></div>
    <div id="headline-ticker" class="headline-ticker hidden" aria-label="League headlines"></div>

    <main class="app-main dash-main">
      <header class="dash-page-header">
        <div>
          <h1>NBA slate</h1>
          <p class="dash-page-kicker">Season + Summer League · next week · <a href="/nba/board">Predictions board</a></p>
        </div>
        <span class="dash-page-kicker" id="slate-date"></span>
      </header>
      <div id="slate-advance-banner" class="hidden" aria-live="polite"></div>

      <div id="slate-loading" class="empty-state">Loading NBA slate…</div>
      <div id="slate-error" class="error-state hidden"></div>
      <div id="game-list" class="game-list"></div>
    </main>
  </div>
  <script src="/static/app.js?v=20260742"></script>
  <script>
    (async function () {
      const loading = document.getElementById("slate-loading");
      const errEl = document.getElementById("slate-error");
      const list = document.getElementById("game-list");
      const dateEl = document.getElementById("slate-date");
      const advanceEl = document.getElementById("slate-advance-banner");
      const dateParam = qs("date");

      initLiveTicker("live-ticker", { date: dateParam, sport: "nba" });
      initHeadlineTicker("headline-ticker");
      renderSkeletonGameList(list, 6);

      const loadUrl = dateParam
        ? `/api/schedule/nba?date=${encodeURIComponent(dateParam)}`
        : "/api/schedule/nba";

      function mapGames(data) {
        const slateDate = data.resolved_date || data.date || "";
        return (data.games || []).map((g) => ({
          ...g,
          sport: "nba",
          slate_date: slateDate,
        }));
      }

      function showEmpty(slate) {
        list.innerHTML = "";
        const kind = slate.no_games_this_week ? "no-nba-games-week" : "no-nba-games";
        renderEmptyState(list, kind);
      }

      try {
        const slate = await fetchJSON(loadUrl);
        const games = mapGames(slate);
        const slateDate = slate.resolved_date || slate.date || "";

        loading.classList.add("hidden");
        dateEl.textContent = slateDate
          ? (slate.auto_advanced ? `Next slate · ${slateDate}` : slateDate)
          : "";
        if (typeof renderSlateAdvanceBanner === "function") {
          renderSlateAdvanceBanner(advanceEl, slate);
        }

        if (!games.length) {
          showEmpty(slate);
          return;
        }

        await loadTeamColors().catch(() => {});
        const boardMap = await fetchSportBoardMap("nba", slateDate);
        renderGameList(list, games, {
          boardMap,
          gameDate: slateDate,
          useCache: !!dateParam,
          colors: _teamColors,
        });

        if (!dateParam) {
          setInterval(async () => {
            try {
              const live = await fetchJSON("/api/schedule/nba");
              if (typeof renderSlateAdvanceBanner === "function") {
                renderSlateAdvanceBanner(advanceEl, live);
              }
              const liveDate = live.resolved_date || live.date || "";
              dateEl.textContent = live.auto_advanced
                ? `Next slate · ${liveDate}`
                : liveDate;
              const mapped = mapGames(live);
              if (!mapped.length) {
                showEmpty(live);
                return;
              }
              const liveBoard = await fetchSportBoardMap("nba", liveDate);
              updateGameCards(list, mapped, { boardMap: liveBoard, colors: _teamColors });
            } catch (_) { /* keep last good state */ }
          }, 60000);
        }
      } catch (e) {
        list.innerHTML = "";
        loading.classList.add("hidden");
        errEl.classList.remove("hidden");
        errEl.textContent = e.message || "Failed to load schedule";
      }
    })();
  </script>
</body>
</html>
